<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinner</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />

    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <meta property="og:title" content="Spinner" />
    <meta
      property="og:description"
      content="A spinner to randomly select weighted items and deduct from inventory."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/og-image.png" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
      }

      .main-container {
        display: flex;
        width: 100%;
        max-width: 1600px;
        height: 100%;
        padding: 25px;
        gap: 30px;
      }

      /* Left Panel */
      .left-panel {
        flex: 0 0 380px;
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 20px;
      }

      details {
        background: #1e293b;
        border-radius: 12px;
        padding: 15px;
        border: 1px solid #334155;
      }
      summary {
        font-weight: 600;
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        color: #94a3b8;
      }
      summary::after {
        content: "＋";
      }
      details[open] summary::after {
        content: "－";
      }

      textarea {
        width: 100%;
        height: 100px;
        margin-top: 15px;
        padding: 12px;
        background: #0f172a;
        color: #38bdf8;
        border: 1px solid #334155;
        border-radius: 8px;
        font-family: "Fira Code", monospace;
        font-size: 0.8rem;
      }

      button {
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .primary-btn {
        background: #3b82f6;
        color: white;
        padding: 12px;
        width: 100%;
        margin-top: 10px;
      }
      .primary-btn:hover {
        background: #2563eb;
      }

      .inventory-container {
        display: flex;
        flex-direction: column;
        flex: 1;
        background: #1e293b;
        border-radius: 12px;
        border: 1px solid #334155;
        overflow: hidden;
      }
      .inventory-header {
        padding: 15px 20px;
        background: #334155;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .inventory-list {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
      }
      .inventory-item {
        display: flex;
        align-items: center;
        padding: 10px 15px;
        border-bottom: 1px solid #334155;
        transition: background 0.2s;
        gap: 6px;
      }
      .inventory-item:hover {
        background: #2d3748;
      }
      .item-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        cursor: pointer;
        flex-shrink: 0;
        border: 2px solid transparent;
      }
      .item-dot:hover {
        border-color: #f8fafc;
      }
      .item-name-input {
        flex: 1;
        min-width: 0;
        background: transparent;
        border: 1px solid transparent;
        color: #f8fafc;
        font-size: 0.9rem;
        font-family: inherit;
        padding: 4px 6px;
        border-radius: 4px;
      }
      .item-name-input:hover {
        border-color: #334155;
      }
      .item-name-input:focus {
        border-color: #38bdf8;
        background: #0f172a;
        outline: none;
      }
      .item-weight-controls {
        display: flex;
        align-items: center;
        gap: 2.5px;
        flex-shrink: 0;
      }
      .item-count {
        font-family: monospace;
        font-weight: bold;
        color: #38bdf8;
        min-width: 22px;
        text-align: right;
      }
      .item-count-sep {
        color: #64748b;
        margin: 0 2px;
      }
      .item-initial-input {
        width: 42px;
        background: #0f172a;
        border: 1px solid #334155;
        color: #38bdf8;
        font-family: monospace;
        font-size: 0.85rem;
        padding: 3px 4px;
        border-radius: 4px;
        text-align: center;
        font-weight: bold;
      }
      .item-initial-input:focus {
        outline: none;
        border-color: #38bdf8;
      }
      .item-initial-input::-webkit-outer-spin-button,
      .item-initial-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .mini-btn {
        background: #475569;
        color: #f8fafc;
        padding: 4px 8px;
        font-size: 0.75rem;
      }
      .mini-btn.danger-mini {
        background: #ef4444;
      }

      /* Tabs */
      .tabs-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 8px;
      }
      .tabs-scroll {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        flex: 1;
        scrollbar-width: thin;
      }
      .tab {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 6px 6px 12px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
        font-size: 0.85rem;
        color: #94a3b8;
        user-select: none;
        transition: all 0.15s;
      }
      .tab:hover {
        border-color: #475569;
        color: #f8fafc;
      }
      .tab.active {
        background: #3b82f6;
        color: white;
        border-color: #3b82f6;
      }
      .tab-close {
        background: transparent;
        border: none;
        color: inherit;
        opacity: 0.55;
        cursor: pointer;
        font-size: 1rem;
        padding: 0 4px;
        line-height: 1;
        border-radius: 4px;
      }
      .tab-close:hover {
        opacity: 1;
        background: rgba(0, 0, 0, 0.25);
      }
      .tab-add-btn {
        background: #334155;
        color: #f8fafc;
        padding: 8px 14px;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .tab-add-btn:hover {
        background: #475569;
      }

      /* Add Item form */
      .add-item-row {
        display: flex;
        gap: 6px;
        padding: 10px 15px;
        border-bottom: 1px solid #334155;
        background: #0f172a;
      }
      .add-item-row input {
        background: #1e293b;
        color: #f8fafc;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 0.85rem;
        font-family: inherit;
      }
      .add-item-row input:focus {
        outline: none;
        border-color: #38bdf8;
      }
      #add-item-name {
        flex: 1;
        min-width: 0;
      }
      #add-item-weight {
        width: 60px;
      }
      .add-item-row button {
        padding: 6px 12px;
        font-size: 0.8rem;
      }

      /* History */
      .history-list {
        margin-top: 15px;
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0f172a;
      }
      .history-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid #1e293b;
        font-size: 0.85rem;
      }
      .history-item:last-child {
        border-bottom: none;
      }
      .history-name {
        color: #f8fafc;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 10px;
      }
      .history-time {
        color: #94a3b8;
        font-size: 0.75rem;
        font-family: monospace;
        flex-shrink: 0;
      }
      .history-empty {
        padding: 15px;
        text-align: center;
        color: #64748b;
        font-size: 0.85rem;
      }
      .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .btn-row .primary-btn {
        margin-top: 0;
      }
      .secondary-btn {
        background: #475569;
        color: #f8fafc;
        padding: 12px;
        width: 100%;
      }
      .secondary-btn:hover {
        background: #64748b;
      }
      .danger-btn {
        background: #ef4444;
        color: white;
        padding: 12px;
        width: 100%;
      }
      .danger-btn:hover {
        background: #dc2626;
      }

      /* Right Panel */
      .right-panel {
        flex: 1;
        background: #1e293b;
        border-radius: 12px;
        border: 1px solid #334155;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      .wheel-container {
        position: relative;
        width: 600px;
        height: 600px;
      }
      canvas {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 20px rgba(0, 0, 0, 0.5));
      }
      .pointer {
        position: absolute;
        top: 50%;
        right: -10px;
        transform: translateY(-50%);
        width: 50px;
        height: 40px;
        background: #ef4444;
        clip-path: polygon(0 50%, 100% 0, 100% 100%);
        z-index: 20;
        border-left: 4px solid white;
      }

      #spin-btn {
        margin-top: 40px;
        padding: 20px 60px;
        font-size: 1.5rem;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border-radius: 50px;
        box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
      }
      #spin-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 30px -5px rgba(16, 185, 129, 0.6);
      }
      #spin-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none;
      }

      /* Winner Overlay */
      #winner-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.9);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        animation: fadeIn 0.3s ease-out;
      }
      .winner-card {
        background: #334155;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        border: 2px solid #38bdf8;
        box-shadow: 0 0 50px rgba(56, 189, 248, 0.2);
        max-width: 80%;
      }
      .winner-card h3 {
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 10px;
      }
      .winner-card h2 {
        font-size: 2.5rem;
        color: #fff;
        margin-bottom: 30px;
        line-height: 1.2;
      }
      .confirm-btn {
        background: #38bdf8;
        color: #0f172a;
        padding: 15px 40px;
        font-size: 1.2rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* MOBILE STYLES */
      @media (max-width: 1000px) {
        body {
          height: auto;
          overflow: auto; /* Allow the page to scroll panels */
        }
        .main-container {
          flex-direction: column;
          height: auto;
          padding: 15px;
          gap: 20px;
        }
        .left-panel {
          order: 2; /* Inventory goes below */
          flex: none;
          width: 100%;
        }
        .right-panel {
          order: 1; /* Spinner goes on top */
          padding: 40px 10px;
          min-height: auto;
        }
        .wheel-container {
          width: 85vw;
          height: 85vw;
          max-width: 500px;
          max-height: 500px;
        }
        .inventory-container {
          max-height: 400px; /* Limit height for internal scroll */
          flex: none;
        }
        #spin-btn {
          margin-top: 20px;
          padding: 15px 40px;
          font-size: 1.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="left-panel">
        <div class="tabs-bar">
          <div class="tabs-scroll" id="tabs"></div>
          <button class="tab-add-btn" onclick="addSpinner()" title="New spinner">
            +
          </button>
        </div>

        <details>
          <summary>Import Data</summary>
          <textarea id="csv-input" placeholder="Name,Weight"></textarea>
          <button class="primary-btn" onclick="loadCSV()">
            Replace Items (this tab)
          </button>
          <div class="btn-row">
            <button class="secondary-btn" onclick="exportState()">
              Export State
            </button>
            <button
              class="secondary-btn"
              onclick="document.getElementById('import-file').click()"
            >
              Import State
            </button>
            <input
              type="file"
              id="import-file"
              accept="application/json"
              style="display: none"
              onchange="importState(event)"
            />
          </div>
        </details>

        <details>
          <summary>Pick History</summary>
          <div class="history-list" id="history-list"></div>
          <button
            class="danger-btn"
            style="margin-top: 10px"
            onclick="clearHistory()"
          >
            Clear History
          </button>
        </details>

        <div class="inventory-container">
          <div class="inventory-header">
            <h3>Items</h3>
            <button
              class="mini-btn"
              style="background: #3b82f6"
              onclick="shuffleItems()"
            >
              Shuffle
            </button>
            <button
              class="mini-btn"
              style="background: #ef4444"
              onclick="resetAll()"
            >
              Reset All
            </button>
          </div>
          <div class="add-item-row">
            <input
              id="add-item-name"
              placeholder="Item name"
              onkeydown="if(event.key==='Enter') addItem()"
            />
            <input
              id="add-item-weight"
              type="number"
              min="1"
              value="1"
              onkeydown="if(event.key==='Enter') addItem()"
            />
            <button
              class="mini-btn"
              style="background: #10b981"
              onclick="addItem()"
            >
              + Add
            </button>
          </div>
          <div class="inventory-list" id="inventory-list"></div>
        </div>
      </div>

      <div class="right-panel">
        <div id="winner-overlay">
          <div class="winner-card">
            <h3>Selected Item</h3>
            <h2 id="winner-text">---</h2>
            <button class="confirm-btn" onclick="confirmWin()">
              Confirm & Deduct
            </button>
          </div>
        </div>

        <div class="wheel-container">
          <canvas id="wheel" width="1200" height="1200"></canvas>
          <div class="pointer"></div>
        </div>
        <button id="spin-btn" onclick="spin()">SPIN THE WHEEL</button>
      </div>
    </div>

    <script>
      const STATE_KEY = "wardrobe_spinner_state_v2";
      const LEGACY_ITEMS_KEY = "wardrobe_spinner_v3";
      const LEGACY_HISTORY_KEY = "wardrobe_spinner_history_v1";

      let state = null;
      let currentRotation = 0;
      let isSpinning = false;
      let lastWinner = null;

      const canvas = document.getElementById("wheel");
      const ctx = canvas.getContext("2d");
      const centerX = 600,
        centerY = 600,
        radius = 597;

      function newId() {
        if (typeof crypto !== "undefined" && crypto.randomUUID) {
          return crypto.randomUUID();
        }
        return `id-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function defaultState() {
        const id = newId();
        return {
          version: 2,
          activeSpinnerId: id,
          spinners: [{ id, name: "Spinner 1", items: [], history: [] }],
        };
      }

      function normalizeSpinner(sp) {
        return {
          id: sp.id || newId(),
          name: sp.name || "Untitled",
          items: Array.isArray(sp.items) ? sp.items : [],
          history: Array.isArray(sp.history) ? sp.history : [],
        };
      }

      function loadState() {
        const raw = localStorage.getItem(STATE_KEY);
        if (raw) {
          try {
            const parsed = JSON.parse(raw);
            if (
              parsed &&
              Array.isArray(parsed.spinners) &&
              parsed.spinners.length
            ) {
              state = {
                version: 2,
                activeSpinnerId: parsed.activeSpinnerId,
                spinners: parsed.spinners.map(normalizeSpinner),
              };
              if (
                !state.spinners.find((sp) => sp.id === state.activeSpinnerId)
              ) {
                state.activeSpinnerId = state.spinners[0].id;
              }
              return;
            }
          } catch (e) {
            console.warn("Failed to parse saved state; falling back.", e);
          }
        }
        const legacyItems = localStorage.getItem(LEGACY_ITEMS_KEY);
        const legacyHistory = localStorage.getItem(LEGACY_HISTORY_KEY);
        if (legacyItems) {
          try {
            const id = newId();
            state = {
              version: 2,
              activeSpinnerId: id,
              spinners: [
                {
                  id,
                  name: "Spinner 1",
                  items: JSON.parse(legacyItems),
                  history: legacyHistory ? JSON.parse(legacyHistory) : [],
                },
              ],
            };
            save();
            return;
          } catch (e) {
            console.warn("Failed to migrate legacy state.", e);
          }
        }
        state = defaultState();
        save();
      }

      function activeSpinner() {
        return (
          state.spinners.find((sp) => sp.id === state.activeSpinnerId) ||
          state.spinners[0]
        );
      }

      function save() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
      }

      function escapeHTML(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      window.onload = () => {
        loadState();
        renderTabs();
        updateUI();
        renderHistory();
      };

      // --- Tabs ---
      function renderTabs() {
        const el = document.getElementById("tabs");
        el.innerHTML = state.spinners
          .map(
            (sp) => `
              <div class="tab ${sp.id === state.activeSpinnerId ? "active" : ""}"
                   onclick="switchSpinner('${sp.id}')"
                   ondblclick="renameSpinner('${sp.id}')"
                   title="Click to switch — double-click to rename">
                <span>${escapeHTML(sp.name)}</span>
                <button class="tab-close"
                        onclick="event.stopPropagation(); deleteSpinner('${sp.id}')"
                        title="Delete spinner">×</button>
              </div>
            `,
          )
          .join("");
      }

      function switchSpinner(id) {
        if (isSpinning) return;
        if (state.activeSpinnerId === id) return;
        state.activeSpinnerId = id;
        currentRotation = 0;
        lastWinner = null;
        document.getElementById("winner-overlay").style.display = "none";
        save();
        renderTabs();
        updateUI();
        renderHistory();
      }

      function addSpinner() {
        const name = prompt(
          "Spinner name:",
          `Spinner ${state.spinners.length + 1}`,
        );
        if (!name || !name.trim()) return;
        const id = newId();
        state.spinners.push({
          id,
          name: name.trim(),
          items: [],
          history: [],
        });
        state.activeSpinnerId = id;
        currentRotation = 0;
        lastWinner = null;
        save();
        renderTabs();
        updateUI();
        renderHistory();
      }

      function renameSpinner(id) {
        const sp = state.spinners.find((s) => s.id === id);
        if (!sp) return;
        const name = prompt("Rename spinner:", sp.name);
        if (!name || !name.trim()) return;
        sp.name = name.trim();
        save();
        renderTabs();
      }

      function deleteSpinner(id) {
        if (state.spinners.length === 1) {
          alert("Can't delete the last spinner.");
          return;
        }
        const sp = state.spinners.find((s) => s.id === id);
        if (!sp) return;
        if (
          !confirm(
            `Delete spinner "${sp.name}"? This removes its items and history.`,
          )
        )
          return;
        state.spinners = state.spinners.filter((s) => s.id !== id);
        if (state.activeSpinnerId === id) {
          state.activeSpinnerId = state.spinners[0].id;
          currentRotation = 0;
          lastWinner = null;
        }
        save();
        renderTabs();
        updateUI();
        renderHistory();
      }

      // --- Items ---
      function loadCSV() {
        const raw = document.getElementById("csv-input").value.trim();
        if (!raw) return;
        const newItems = raw
          .split("\n")
          .map((line, i) => {
            const parts = line.split(",");
            const weight = parseInt(parts.pop());
            const name = parts.join(",").trim();
            return {
              id: Date.now() + i,
              name,
              initialWeight: weight,
              currentWeight: weight,
              isVisible: true,
              color: `hsl(${(i * 137.5) % 360}, 60%, 50%)`,
            };
          })
          .filter((item) => item.name && !isNaN(item.currentWeight));

        activeSpinner().items = newItems;
        save();
        updateUI();
        document.getElementById("csv-input").value = "";
        document.querySelector("details").open = false;
      }

      function addItem() {
        const nameEl = document.getElementById("add-item-name");
        const weightEl = document.getElementById("add-item-weight");
        const name = nameEl.value.trim();
        const weight = parseInt(weightEl.value);
        if (!name) {
          nameEl.focus();
          return;
        }
        if (isNaN(weight) || weight < 1) {
          alert("Weight must be a positive integer.");
          weightEl.focus();
          return;
        }
        const sp = activeSpinner();
        const i = sp.items.length;
        sp.items.push({
          id: Date.now() + Math.random(),
          name,
          initialWeight: weight,
          currentWeight: weight,
          isVisible: true,
          color: `hsl(${(i * 137.5) % 360}, 60%, 50%)`,
        });
        nameEl.value = "";
        weightEl.value = "1";
        save();
        updateUI();
        nameEl.focus();
      }

      function renameItem(i, value) {
        const v = value.trim();
        if (!v) {
          updateUI();
          return;
        }
        activeSpinner().items[i].name = v;
        save();
        updateUI();
      }

      function setInitialWeight(i, value) {
        const w = parseInt(value);
        if (isNaN(w) || w < 0) {
          updateUI();
          return;
        }
        activeSpinner().items[i].initialWeight = w;
        save();
        updateUI();
      }

      function deleteItem(i) {
        const sp = activeSpinner();
        if (!confirm(`Delete "${sp.items[i].name}"?`)) return;
        sp.items.splice(i, 1);
        save();
        updateUI();
      }

      function updateUI() {
        const sp = activeSpinner();
        const list = document.getElementById("inventory-list");
        list.innerHTML = sp.items
          .map(
            (item, i) => `
              <div class="inventory-item" style="opacity: ${item.isVisible && item.currentWeight > 0 ? 1 : 0.4}">
                <div class="item-dot" style="background:${item.color}"
                     onclick="toggleVisibility(${i})"
                     title="Click to enable/disable"></div>
                <input class="item-name-input"
                       value="${escapeHTML(item.name)}"
                       onchange="renameItem(${i}, this.value)"
                       title="Edit name" />
                <div class="item-weight-controls">
                  <button class="mini-btn" onclick="adjustWeight(${i}, -1)">−</button>
                  <span class="item-count">${item.currentWeight}</span>
                  <span class="item-count-sep">/</span>
                  <input class="item-initial-input" type="number" min="0"
                         value="${item.initialWeight}"
                         onchange="setInitialWeight(${i}, this.value)"
                         title="Initial weight" />
                  <button class="mini-btn" onclick="adjustWeight(${i}, 1)">＋</button>
                </div>
                <button class="mini-btn" onclick="resetOne(${i})"
                        title="Reset current to initial">Reset</button>
                <button class="mini-btn danger-mini"
                        onclick="deleteItem(${i})"
                        title="Delete item">×</button>
              </div>
            `,
          )
          .join("");

        draw();

        const canSpin = sp.items.some(
          (i) => i.isVisible && i.currentWeight > 0,
        );
        document.getElementById("spin-btn").disabled = !canSpin;
      }

      function resetOne(i) {
        const sp = activeSpinner();
        sp.items[i].currentWeight = sp.items[i].initialWeight;
        save();
        updateUI();
      }
      function resetAll() {
        if (confirm("Reset all?")) {
          activeSpinner().items.forEach(
            (i) => (i.currentWeight = i.initialWeight),
          );
          save();
          updateUI();
        }
      }

      function toggleVisibility(i) {
        activeSpinner().items[i].isVisible =
          !activeSpinner().items[i].isVisible;
        save();
        updateUI();
      }

      function adjustWeight(i, delta) {
        const sp = activeSpinner();
        sp.items[i].currentWeight = Math.max(
          0,
          sp.items[i].currentWeight + delta,
        );
        save();
        updateUI();
      }

      function shuffleItems() {
        const arr = activeSpinner().items;
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        save();
        updateUI();
      }

      // --- History ---
      function formatTimestamp(iso) {
        const d = new Date(iso);
        return d.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function renderHistory() {
        const list = document.getElementById("history-list");
        const history = activeSpinner().history;
        if (!history.length) {
          list.innerHTML = `<div class="history-empty">No picks yet</div>`;
          return;
        }
        list.innerHTML = history
          .map(
            (entry) => `
              <div class="history-item">
                <div class="history-name" title="${escapeHTML(entry.name)}">${escapeHTML(entry.name)}</div>
                <div class="history-time">${formatTimestamp(entry.timestamp)}</div>
              </div>
            `,
          )
          .join("");
      }

      function clearHistory() {
        const sp = activeSpinner();
        if (!sp.history.length) return;
        if (confirm(`Clear pick history for "${sp.name}"?`)) {
          sp.history = [];
          save();
          renderHistory();
        }
      }

      // --- Import/Export ---
      function exportState() {
        const payload = {
          version: 2,
          exportedAt: new Date().toISOString(),
          activeSpinnerId: state.activeSpinnerId,
          spinners: state.spinners,
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        a.href = url;
        a.download = `spinner-state-${stamp}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function importState(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target.result);
            let imported;
            if (Array.isArray(parsed.spinners) && parsed.spinners.length) {
              imported = {
                version: 2,
                activeSpinnerId: parsed.activeSpinnerId,
                spinners: parsed.spinners.map(normalizeSpinner),
              };
              if (
                !imported.spinners.find(
                  (sp) => sp.id === imported.activeSpinnerId,
                )
              ) {
                imported.activeSpinnerId = imported.spinners[0].id;
              }
            } else if (Array.isArray(parsed.items)) {
              const id = newId();
              imported = {
                version: 2,
                activeSpinnerId: id,
                spinners: [
                  {
                    id,
                    name: "Imported",
                    items: parsed.items,
                    history: Array.isArray(parsed.history)
                      ? parsed.history
                      : [],
                  },
                ],
              };
            } else {
              throw new Error("Unrecognized state format");
            }
            if (
              !confirm(
                "Replace ALL spinners with imported state? This can't be undone.",
              )
            ) {
              event.target.value = "";
              return;
            }
            state = imported;
            currentRotation = 0;
            lastWinner = null;
            document.getElementById("winner-overlay").style.display = "none";
            save();
            renderTabs();
            updateUI();
            renderHistory();
          } catch (err) {
            alert("Failed to import: " + err.message);
          }
          event.target.value = "";
        };
        reader.readAsText(file);
      }

      // --- Wheel drawing + spin ---
      function draw(rot = currentRotation) {
        const items = activeSpinner().items;
        const active = items.filter((i) => i.isVisible && i.currentWeight > 0);
        const total = active.reduce((s, i) => s + i.currentWeight, 0);
        ctx.clearRect(0, 0, 1200, 1200);
        if (!total) {
          drawEmpty();
          return;
        }

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(rot);

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = active[0].color;
        ctx.fill();

        let currentAngle = 0;
        active.forEach((item) => {
          const slice = (item.currentWeight / total) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, currentAngle, currentAngle + slice);
          ctx.fillStyle = item.color;
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.save();
          ctx.rotate(currentAngle + slice / 2);
          ctx.fillStyle = "white";
          ctx.font = "bold 26px sans-serif";
          ctx.textAlign = "right";
          if (!isSpinning) {
            ctx.shadowColor = "rgba(0,0,0,0.8)";
            ctx.shadowBlur = 10;
          }
          ctx.fillText(
            item.name.length > 30 ? item.name.slice(0, 27) + "..." : item.name,
            radius - 50,
            10,
          );
          ctx.restore();

          currentAngle += slice;
        });
        ctx.restore();
      }

      function drawEmpty() {
        ctx.fillStyle = "#1e293b";
        ctx.beginPath();
        ctx.arc(600, 600, 600, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#475569";
        ctx.font = "40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Add items to start", 600, 600);
      }

      function spin() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById("spin-btn").disabled = true;

        const duration = 8000;
        const startRot = currentRotation;
        const extraRots = Math.PI * 2 * (4 + Math.random() * 2);
        const endRot = startRot + extraRots;
        const startTime = performance.now();

        function animate(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - t, 5);

          currentRotation = startRot + (endRot - startRot) * ease;
          draw();

          if (t < 1) {
            requestAnimationFrame(animate);
          } else {
            isSpinning = false;
            currentRotation %= Math.PI * 2;
            showWinner();
          }
        }
        requestAnimationFrame(animate);
      }

      function showWinner() {
        const items = activeSpinner().items;
        const active = items.filter((i) => i.isVisible && i.currentWeight > 0);
        const total = active.reduce((s, i) => s + i.currentWeight, 0);

        let stopAngle =
          (Math.PI * 2 - (currentRotation % (Math.PI * 2))) % (Math.PI * 2);
        let currentAngle = 0;

        for (let item of active) {
          const slice = (item.currentWeight / total) * Math.PI * 2;
          if (stopAngle >= currentAngle && stopAngle <= currentAngle + slice) {
            lastWinner = item;
            break;
          }
          currentAngle += slice;
        }

        if (lastWinner) {
          document.getElementById("winner-text").innerText = lastWinner.name;
          document.getElementById("winner-overlay").style.display = "flex";
        }
      }

      function confirmWin() {
        const sp = activeSpinner();
        const idx = sp.items.findIndex((i) => i.id === lastWinner.id);
        if (idx !== -1) {
          sp.items[idx].currentWeight = Math.max(
            0,
            sp.items[idx].currentWeight - 1,
          );
        }
        sp.history.unshift({
          name: lastWinner.name,
          timestamp: new Date().toISOString(),
        });
        save();
        renderHistory();
        document.getElementById("winner-overlay").style.display = "none";
        updateUI();
      }
    </script>
  </body>
</html>
