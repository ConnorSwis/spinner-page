<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinner</title>
    <!-- iOS home screen icon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Spinner" />
    <meta
      property="og:description"
      content="A spinner to randomly select weighted items and deduct from inventory."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/og-image.png" />
  </head>
  <body>
    <div class="main-container">
      <div class="left-panel">
        <details>
          <summary>Import Data</summary>
          <textarea id="csv-input" placeholder="Name,Weight"></textarea>
          <button class="primary-btn" onclick="loadCSV()">Replace All</button>
        </details>

        <div class="inventory-container">
          <div class="inventory-header">
            <h3>Inventory</h3>
            <button
              class="mini-btn"
              style="background: #ef4444"
              onclick="resetAll()"
            >
              Reset All
            </button>
          </div>
          <div class="inventory-list" id="inventory-list"></div>
        </div>
      </div>

      <div class="right-panel">
        <div id="winner-overlay">
          <div class="winner-card">
            <h3>Selected Item</h3>
            <h2 id="winner-text">---</h2>
            <button class="confirm-btn" onclick="confirmWin()">
              Confirm & Deduct
            </button>
          </div>
        </div>

        <div class="wheel-container">
          <canvas id="wheel" width="1200" height="1200"></canvas>
          <div class="pointer"></div>
        </div>
        <button id="spin-btn" onclick="spin()">SPIN THE WHEEL</button>
      </div>
    </div>
  </body>
  <script src="js/script.js"></script>
</html>
